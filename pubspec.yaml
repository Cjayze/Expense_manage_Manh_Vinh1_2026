name: quanlychitieu_manh_vinh_1_2026
description: "A new Flutter project for expense management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Quản lý cơ sở dữ liệu local bằng Hive
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Thư viện hỗ trợ định dạng tiền tệ và ngày tháng (đã được cập nhật bản mới)
  intl: ^0.19.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Các gói phục vụ sinh code tự động cho Hive (.g.dart)
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true